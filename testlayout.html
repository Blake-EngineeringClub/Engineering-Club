<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4x4 Grid Layout</title>
    <link rel="stylesheet" href="testlayout.css">
</head>
<body>

    <div class="grid-container">
        <!-- Row 1: Spans all 4 columns -->
        <div class="header">Header (Spans 4 Columns)</div>

        <!-- Rows 2 & 3: Spans 2 rows and 4 columns -->
        <div class="main-content">Main Content (Spans 2 Rows, 4 Columns)</div>

        <!-- Row 4: 4 individual cells -->
        <div class="footer-item">Cell 1</div>
        <div class="footer-item">Cell 2</div>
        <div class="footer-item">Cell 3</div>
        <div class="footer-item">Cell 4</div>
    </div>

</body>
</html>
