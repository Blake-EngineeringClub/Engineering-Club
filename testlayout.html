<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4x4 Grid Layout</title>
    <link rel="stylesheet" href="testlayout.css">
</head>
<body>

    <div class="grid-container">
        <div class="item header">Row 1: Spans 4 Columns</div>
        <div class="item main" onclick="this.classList.toggle('is-flipped')">
            <div class="main-inner">
                <div class="menu boxes">
                    <h1> jeopardy style menu here</h1>
                </div>
                <div class="question">
                    <h1>Question Title</h1>
                    <p>question goes here</p>
                    <p>answers go here for mc</p>
                </div>
            </div>        
        </div>
        <div class="item footer red">R4: Cell 1</div>
        <div class="item footer blue">R4: Cell 2</div>
        <div class="item footer green">R4: Cell 3</div>
        <div class="item footer yellow">R4: Cell 4</div>
    </div>

</body>
</html>
